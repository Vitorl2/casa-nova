<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel — Casa Nova</title>
  <style>
    :root{
      --verde:#2f9e7f; --verde-escuro:#247a62; --borda:#ece4da;
      --fundo:#fdf8f3; --texto:#3d3a36; --suave:#8a8276;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:"Segoe UI",system-ui,sans-serif;background:var(--fundo);
      color:var(--texto);line-height:1.5;padding:18px;max-width:760px;margin:0 auto;}
    h1{color:var(--verde-escuro);font-size:24px;margin-bottom:4px;}
    h2{color:var(--verde-escuro);font-size:18px;margin:24px 0 10px;}
    p.intro{color:var(--suave);font-size:14px;margin-bottom:8px;}
    .card{background:#fff;border:1px solid var(--borda);border-radius:14px;
      padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(60,50,40,.06);}
    label{display:block;font-size:13px;font-weight:600;margin:10px 0 4px;}
    input,select{width:100%;padding:10px;border:1px solid var(--borda);
      border-radius:8px;font-size:15px;background:#fff;}
    .linha{display:flex;gap:10px;flex-wrap:wrap;}
    .linha>div{flex:1;min-width:120px;}
    button{cursor:pointer;border:none;border-radius:8px;font-size:15px;
      font-weight:600;padding:11px 16px;transition:.15s;}
    .btn-add{background:var(--verde);color:#fff;width:100%;margin-top:14px;}
    .btn-add:hover{background:var(--verde-escuro);}
    .item{display:flex;justify-content:space-between;align-items:center;gap:10px;
      padding:10px 12px;border:1px solid var(--borda);border-radius:10px;margin-bottom:8px;}
    .item .info{font-size:14px;}
    .item .info small{color:var(--suave);}
    .item .acoes{display:flex;gap:6px;flex-shrink:0;}
    .btn-mini{padding:6px 10px;font-size:13px;}
    .btn-editar{background:#fdf0db;color:#b9822f;}
    .btn-remover{background:#fde3e0;color:#c0463b;}
    .btn-salvar{background:var(--verde);color:#fff;width:100%;font-size:17px;padding:15px;}
    .btn-salvar:hover{background:var(--verde-escuro);}
    .btn-salvar.ok{background:#e8a04a;}
    .editando{outline:2px solid var(--verde);outline-offset:2px;}
    .topo{display:flex;justify-content:space-between;align-items:center;}
    .btn-sair{background:#f0ede8;color:var(--suave);padding:8px 14px;font-size:13px;}
    .status{font-size:13px;color:var(--suave);margin-top:8px;text-align:center;}
    /* Tela de login */
    #login{max-width:380px;margin:8vh auto 0;}
    #login .card{padding:24px;}
    #painel{display:none;}
  </style>
</head>
<body>

  <!-- ============ TELA DE LOGIN ============ -->
  <div id="login">
    <h1 style="text-align:center">🔒 Painel da Casa Nova</h1>
    <p class="intro" style="text-align:center">Entre com seu e-mail e senha para gerenciar os presentes.</p>
    <div class="card">
      <label>E-mail</label>
      <input id="loginEmail" type="email" autocomplete="username" placeholder="vitorsiqueira834@gmail.com" />
      <label>Senha</label>
      <input id="loginSenha" type="password" autocomplete="current-password" placeholder="sua senha" />
      <button class="btn-add" id="btnEntrar">Entrar</button>
      <p class="status" id="loginErro" style="color:#c0463b"></p>
    </div>
  </div>

  <!-- ============ PAINEL (aparece após login) ============ -->
  <div id="painel">
    <div class="topo">
      <h1>🛠️ Painel da Casa Nova</h1>
      <button class="btn-sair" id="btnSair">Sair</button>
    </div>
    <p class="intro">Adicione, edite ou remova itens. Ao terminar, clique em <strong>Salvar tudo na nuvem</strong> — o site atualiza na hora, sem GitHub.</p>

    <!-- SUAS INFORMAÇÕES -->
    <div class="card">
      <h2 style="margin-top:0">Suas informações</h2>
      <label>Seu nome (aparece na mensagem do WhatsApp)</label>
      <input id="cfgNome" type="text" />
      <label>WhatsApp (só números: 55 + DDD + número)</label>
      <input id="cfgWhats" type="text" inputmode="numeric" />
      <label>Chave Pix</label>
      <input id="cfgPix" type="text" />
    </div>

    <!-- ADICIONAR / EDITAR ITEM -->
    <div class="card" id="formCard">
      <h2 style="margin-top:0" id="formTitulo">Adicionar item</h2>
      <label>Nome do item</label>
      <input id="itNome" type="text" placeholder="Ex.: Cafeteira" />
      <div class="linha">
        <div>
          <label>Categoria</label>
          <select id="itCategoria"></select>
        </div>
        <div>
          <label>Valor total (R$)</label>
          <input id="itTotal" type="number" min="0" placeholder="Ex.: 200" />
        </div>
        <div>
          <label>Já arrecadado (R$)</label>
          <input id="itArrecadado" type="number" min="0" value="0" />
        </div>
      </div>
      <label>Link da loja (opcional)</label>
      <input id="itLink" type="text" placeholder="https://..." />
      <button class="btn-add" id="btnSalvarItem">+ Adicionar item</button>
    </div>

    <!-- LISTA ATUAL -->
    <h2>Itens atuais (<span id="contador">0</span>)</h2>
    <div id="listaItens"></div>
    <button class="btn-mini" id="btnExemplos"
      style="background:#eef7f3;color:var(--verde-escuro);margin-top:4px">
      ↩️ Restaurar os 10 itens de exemplo
    </button>

    <!-- SALVAR -->
    <h2>Salvar</h2>
    <button class="btn-salvar" id="btnSalvarNuvem">💾 Salvar tudo na nuvem</button>
    <p class="status" id="statusSalvar"></p>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="firebase-init.js"></script>
  <!-- dados.js: usado só como ponto de partida na 1ª vez -->
  <script src="dados.js"></script>
  <script>
    let lista = [];
    let editandoIndex = null;
    const selCat = document.getElementById("itCategoria");

    // Preenche o dropdown de categorias (sem "Todos", que é só filtro)
    CATEGORIAS.filter(c => c !== "Todos").forEach(c => {
      const o = document.createElement("option");
      o.value = c; o.textContent = c; selCat.appendChild(o);
    });

    function formatarReal(v){
      return Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
    }

    // ---------- LOGIN ----------
    const auth = firebase.auth();

    document.getElementById("btnEntrar").addEventListener("click", entrar);
    document.getElementById("loginSenha").addEventListener("keydown", e => {
      if (e.key === "Enter") entrar();
    });

    function entrar(){
      const email = document.getElementById("loginEmail").value.trim();
      const senha = document.getElementById("loginSenha").value;
      document.getElementById("loginErro").textContent = "";
      auth.signInWithEmailAndPassword(email, senha).catch(err => {
        document.getElementById("loginErro").textContent =
          "Não consegui entrar. Confira o e-mail e a senha.";
        console.warn(err);
      });
    }

    document.getElementById("btnSair").addEventListener("click", () => auth.signOut());

    // Mostra painel ou login conforme o estado de autenticação
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        document.getElementById("login").style.display = "none";
        document.getElementById("painel").style.display = "block";
        await carregarDados();
      } else {
        document.getElementById("login").style.display = "block";
        document.getElementById("painel").style.display = "none";
      }
    });

    // ---------- CARREGAR DADOS (nuvem ou dados.js) ----------
    async function carregarDados(){
      let nome = CONFIG.nome, whats = CONFIG.whatsapp, pix = CONFIG.chavePix;
      lista = PRESENTES.map(p => ({...p, link: p.link || ""}));
      try {
        const doc = await DOC_DADOS.get();
        if (doc.exists) {
          const d = doc.data();
          nome  = d.nome ?? nome;
          whats = d.whatsapp ?? whats;
          pix   = d.chavePix ?? pix;
          // Usa a lista da nuvem mesmo vazia (vazio = você apagou tudo).
          if (Array.isArray(d.presentes)) {
            lista = d.presentes.map(p => ({...p, link: p.link || ""}));
          }
        }
      } catch(e){ console.warn("Falha ao ler da nuvem, usando dados locais.", e); }
      document.getElementById("cfgNome").value  = nome;
      document.getElementById("cfgWhats").value = whats;
      document.getElementById("cfgPix").value   = pix;
      renderLista();
    }

    // ---------- LISTA ----------
    function renderLista(){
      const div = document.getElementById("listaItens");
      document.getElementById("contador").textContent = lista.length;
      div.innerHTML = "";
      lista.forEach((p, i) => {
        const el = document.createElement("div");
        el.className = "item" + (editandoIndex === i ? " editando" : "");
        el.innerHTML = `
          <div class="info">
            <strong>${p.nome}</strong> — ${formatarReal(p.valorTotal)}<br>
            <small>${p.categoria}${p.valorArrecadado>0?` · arrecadado ${formatarReal(p.valorArrecadado)}`:""}${p.link?" · 🔗 com link":""}</small>
          </div>
          <div class="acoes">
            <button class="btn-mini btn-editar" onclick="editarItem(${i})">Editar</button>
            <button class="btn-mini btn-remover" onclick="removerItem(${i})">Remover</button>
          </div>`;
        div.appendChild(el);
      });
    }

    function limparForm(){
      editandoIndex = null;
      document.getElementById("formTitulo").textContent = "Adicionar item";
      document.getElementById("btnSalvarItem").textContent = "+ Adicionar item";
      document.getElementById("itNome").value = "";
      document.getElementById("itTotal").value = "";
      document.getElementById("itArrecadado").value = "0";
      document.getElementById("itLink").value = "";
      selCat.selectedIndex = 0;
      renderLista();
    }

    document.getElementById("btnSalvarItem").addEventListener("click", () => {
      const nome = document.getElementById("itNome").value.trim();
      const total = parseFloat(document.getElementById("itTotal").value);
      const arrec = parseFloat(document.getElementById("itArrecadado").value) || 0;
      if(!nome){ alert("Digite o nome do item."); return; }
      if(!total || total <= 0){ alert("Digite um valor total válido."); return; }
      const item = {
        nome,
        categoria: selCat.value,
        valorTotal: total,
        valorArrecadado: Math.min(arrec, total),
        link: document.getElementById("itLink").value.trim(),
      };
      if(editandoIndex === null){ lista.push(item); }
      else { lista[editandoIndex] = item; }
      limparForm();
      document.getElementById("listaItens").scrollIntoView({behavior:"smooth"});
    });

    window.editarItem = function(i){
      const p = lista[i];
      editandoIndex = i;
      document.getElementById("formTitulo").textContent = "Editando: " + p.nome;
      document.getElementById("btnSalvarItem").textContent = "Salvar alteração";
      document.getElementById("itNome").value = p.nome;
      selCat.value = p.categoria;
      document.getElementById("itTotal").value = p.valorTotal;
      document.getElementById("itArrecadado").value = p.valorArrecadado;
      document.getElementById("itLink").value = p.link || "";
      renderLista();
      document.getElementById("formCard").scrollIntoView({behavior:"smooth"});
    };

    window.removerItem = function(i){
      if(confirm(`Remover "${lista[i].nome}"?`)){
        lista.splice(i,1);
        if(editandoIndex === i) limparForm();
        else renderLista();
      }
    };

    // Restaura os 10 itens de exemplo (só na tela; só salva ao clicar em Salvar)
    document.getElementById("btnExemplos").addEventListener("click", () => {
      if(confirm("Isto substitui a lista atual pelos 10 itens de exemplo. As mudanças só valem depois que você clicar em 'Salvar tudo na nuvem'. Continuar?")){
        lista = PRESENTES.map(p => ({...p, link: p.link || ""}));
        limparForm();
      }
    });

    // ---------- SALVAR NA NUVEM ----------
    document.getElementById("btnSalvarNuvem").addEventListener("click", async () => {
      const btn = document.getElementById("btnSalvarNuvem");
      const status = document.getElementById("statusSalvar");
      const dados = {
        nome: document.getElementById("cfgNome").value.trim(),
        whatsapp: document.getElementById("cfgWhats").value.replace(/\D/g,""),
        chavePix: document.getElementById("cfgPix").value.trim(),
        presentes: lista,
      };
      btn.disabled = true;
      status.textContent = "Salvando...";
      try {
        await DOC_DADOS.set(dados);
        btn.textContent = "✓ Salvo na nuvem!";
        btn.classList.add("ok");
        status.textContent = "Pronto! O site já está atualizado. 🎉";
        setTimeout(()=>{ btn.textContent="💾 Salvar tudo na nuvem"; btn.classList.remove("ok"); }, 2500);
      } catch(e){
        status.textContent = "Erro ao salvar. Você está logado? Tente sair e entrar de novo.";
        console.warn(e);
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
